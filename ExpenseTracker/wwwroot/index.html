<!DOCTYPE html>
<html lang="en">

<head>

    <style>
        #app-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100svh;
            gap: 1rem;
            background: #f3f6fb;

        }
        #app-loading .splash-icon {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #app-loading .splash-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -.01em;
        }

<body>
    <div id="app">
        <div id="app-loading">
            <div class="splash-icon" >
